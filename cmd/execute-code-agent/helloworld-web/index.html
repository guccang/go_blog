<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎万秀彬同志</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <div class="header">
            <h1 class="title">
                <span class="welcome">欢迎</span>
                <span class="name">万秀彬同志</span>
            </h1>
            <div class="subtitle">热烈欢迎您的到来</div>
        </div>
        
        <div class="main-content">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-star"></i>
                    <h2>诚挚祝福</h2>
                    <i class="fas fa-star"></i>
                </div>
                <div class="card-body">
                    <p class="blessing">祝福2026健康强壮，力能鼎牛</p>
                    <div class="blessing-animation">
                        <div class="pulse-circle"></div>
                        <div class="pulse-circle delay-1"></div>
                        <div class="pulse-circle delay-2"></div>
                    </div>
                </div>
            </div>
            
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-heartbeat"></i>
                    </div>
                    <h3>健康</h3>
                    <p>身体健康，精神饱满</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-dumbbell"></i>
                    </div>
                    <h3>强壮</h3>
                    <p>体魄强健，力量充沛</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-bullhorn"></i>
                    </div>
                    <h3>鼎牛</h3>
                    <p>力能扛鼎，牛气冲天</p>
                </div>
            </div>
            
            <div class="countdown">
                <h3><i class="fas fa-calendar-alt"></i> 2026倒计时</h3>
                <div class="countdown-timer">
                    <div class="countdown-item">
                        <span class="countdown-number" id="days">0</span>
                        <span class="countdown-label">天</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="hours">0</span>
                        <span class="countdown-label">时</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="minutes">0</span>
                        <span class="countdown-label">分</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="seconds">0</span>
                        <span class="countdown-label">秒</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Created with <i class="fas fa-heart"></i> for 万秀彬同志</p>
            <p class="year">2026 · 美好祝愿</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

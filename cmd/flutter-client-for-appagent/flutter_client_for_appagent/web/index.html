<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_client_for_appagent">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_client_for_appagent</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: light;
      --loader-bg: radial-gradient(circle at top, #fffdf7 0%, #f4efe6 45%, #e7dcc8 100%);
      --loader-card: rgba(255, 251, 245, 0.84);
      --loader-border: rgba(119, 98, 73, 0.12);
      --loader-shadow: 0 24px 80px rgba(66, 48, 28, 0.14);
      --loader-text: #1f2b24;
      --loader-subtle: #72614f;
      --loader-accent: #154a3f;
      --loader-accent-soft: rgba(21, 74, 63, 0.14);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f4efe6;
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--loader-bg);
      transition: opacity 260ms ease, visibility 260ms ease;
    }

    #app-loader.app-loader--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app-loader__panel {
      width: min(100%, 420px);
      padding: 28px 26px 24px;
      border-radius: 28px;
      background: var(--loader-card);
      border: 1px solid var(--loader-border);
      box-shadow: var(--loader-shadow);
      backdrop-filter: blur(14px);
    }

    .app-loader__brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--loader-subtle);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .app-loader__brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #1e6b5c 0%, #ca8752 100%);
      box-shadow: 0 0 0 6px var(--loader-accent-soft);
    }

    .app-loader__title {
      margin: 18px 0 8px;
      color: var(--loader-text);
      font-size: clamp(28px, 7vw, 38px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .app-loader__subtitle {
      margin: 0;
      color: var(--loader-subtle);
      font-size: 15px;
      line-height: 1.6;
    }

    .app-loader__progress {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .app-loader__spinner {
      position: relative;
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
    }

    .app-loader__spinner::before,
    .app-loader__spinner::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .app-loader__spinner::before {
      border: 4px solid rgba(21, 74, 63, 0.12);
    }

    .app-loader__spinner::after {
      border: 4px solid transparent;
      border-top-color: var(--loader-accent);
      border-right-color: #ca8752;
      animation: app-loader-spin 960ms linear infinite;
    }

    .app-loader__copy {
      min-width: 0;
    }

    .app-loader__status {
      margin: 0;
      color: var(--loader-text);
      font-size: 16px;
      font-weight: 700;
    }

    .app-loader__hint {
      margin: 6px 0 0;
      color: var(--loader-subtle);
      font-size: 13px;
      line-height: 1.5;
    }

    .app-loader__bar {
      margin-top: 22px;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(21, 74, 63, 0.12);
    }

    .app-loader__bar::after {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #154a3f 0%, #ca8752 100%);
      animation: app-loader-sweep 1.4s ease-in-out infinite;
    }

    .app-loader__footnote {
      margin-top: 16px;
      color: rgba(114, 97, 79, 0.88);
      font-size: 12px;
      line-height: 1.5;
    }

    @keyframes app-loader-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes app-loader-sweep {
      0% {
        transform: translateX(-120%);
      }

      100% {
        transform: translateX(320%);
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" role="status" aria-live="polite" aria-busy="true">
    <div class="app-loader__panel">
      <div class="app-loader__brand">
        <span class="app-loader__brand-dot"></span>
        App Agent
      </div>
      <h1 class="app-loader__title">正在加载网页应用</h1>
      <p class="app-loader__subtitle">
        Flutter Web 首次打开会先下载运行时资源，网络较慢时会多等一会儿。
      </p>
      <div class="app-loader__progress">
        <div class="app-loader__spinner" aria-hidden="true"></div>
        <div class="app-loader__copy">
          <p class="app-loader__status" id="app-loader-status">正在准备资源…</p>
          <p class="app-loader__hint" id="app-loader-hint">
            首次访问通常比后续刷新更慢，加载完成后会自动进入聊天页面。
          </p>
        </div>
      </div>
      <div class="app-loader__bar" aria-hidden="true"></div>
      <div class="app-loader__footnote" id="app-loader-footnote">
        如果长时间没有进入页面，请确认当前是通过 HTTP 服务访问，而不是直接打开本地文件。
      </div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

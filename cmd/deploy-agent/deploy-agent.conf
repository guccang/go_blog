# Deploy Agent 全局配置

# --- WebSocket daemon 模式 ---
#server_url=ws://localhost:10086/ws/uap
server_url=ws://blog.guccang.cn:10086/ws/uap
agent_name=deploy-agent-mac
auth_token=guccang@blog.guccang.cn
max_concurrent=2

# --- SSH 全局配置 ---
ssh_key=

# --- 项目配置目录 ---
# 每个 .conf 文件对应一个项目，文件名即项目名
settings_dir=./settings

# --- Workspace 目录 ---
# 扫描子目录发现项目（含 go.mod 的子目录 = 一个项目）
workspaces=E:\githubdesktop\
